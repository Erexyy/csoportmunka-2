<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autóink - CarGo</title>
    <link rel="stylesheet" href="autoberlo.css"> 
    <style> 
        .car-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        .car-card {
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            padding-bottom: 15px;
            transition: transform 0.3s;
        }
        .car-card:hover { transform: scale(1.05); }
        .car-card img { width: 100%; height: 200px; object-fit: cover; }
        .price { color: #2ecc71; font-weight: bold; font-size: 1.2em; }
        
        /* Modal beviteli mezők stílusa */
        input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Hogy ne lógjon ki a keretből */
        }
    </style>
</head>
<body>

    <header>
        <nav class="h1">
            <h1>CarGo</h1>
            <ul class="nav-links">
                <li><a href="autoberlo.html">Főoldal</a></li>
                <li><a href="autok.html" style="text-decoration: underline;"> Autók</a></li>
                <li><a href="foglalas"> Foglalás</a></li>
                <li><a href="kapcsolat"> Kapcsolat </a></li>
            </ul>
        </nav>
    </header>

    <h2 style="text-align: center; margin-top: 20px;">Válaszd ki az útitársadat!</h2>

    <div id="car-list" class="car-container"></div>

    <script>
        const autok = [
            { nev: "Mercedes S350", ar: "35.000 Ft / nap", kep: "merci.png" },
            { nev: "Porsche 911", ar: "85.000 Ft / nap", kep: "porsche.jpg" },
            { nev: "Audi RS6", ar: "60.000 Ft / nap", kep: "audi.jpg" },
            { nev: "Volkswagen Golf 8", ar: "15.000 Ft / nap", kep: "golf.jpg" }
        ];

        const listaHelye = document.getElementById('car-list');

        autok.forEach(auto => {
            const kartya = `
                <div class="car-card">
                    <img src="${auto.kep}" alt="${auto.nev}">
                    <h3>${auto.nev}</h3>
                    <p class="price">${auto.ar}</p>
                    <button onclick="megnyitFoglalas('${auto.nev}', '${auto.ar}')">Lefoglalom</button>
                </div>
            `;
            listaHelye.innerHTML += kartya;
        });
    </script>

    <div id="foglalasModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000;">
        <div style="background:white; max-width:400px; margin:50px auto; padding:20px; border-radius:10px; font-family: sans-serif;">
            <h2 id="modalAutoNev"></h2>
            <p id="modalAutoAr" style="color: #666;"></p>
            <hr>
            <form id="foglalasForm">
                <label><b>Neved:</b></label><br>
                <input type="text" id="ugyfelNev" placeholder="Minta János" required style="width:100%; margin-bottom:15px;"><br>
                
                <label><b>Hány napra béreled?</b></label><br>
                <input type="number" id="napokSzama" min="1" value="1" required style="width:100%; margin-bottom:15px;"><br>
                
                <h3 id="vegosszeg" style="background: #f9f9f9; padding: 10px; border-left: 5px solid #2ecc71;">Végösszeg: -</h3>
                
                <button type="submit" style="background:#2ecc71; color:white; border:none; padding:12px; width:100%; cursor:pointer; font-weight: bold; border-radius: 5px;">Foglalás véglegesítése</button>
                <button type="button" onclick="document.getElementById('foglalasModal').style.display='none'" style="background:none; color:gray; border:none; padding:10px; width:100%; cursor:pointer; text-decoration: underline;">Mégse</button>
            </form>
        </div>
    </div>

    <script src="foglalas.js"></script>

</body>
</html>
